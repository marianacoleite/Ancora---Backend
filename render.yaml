# Blueprint Render: https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: ancora-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGIN
        value: https://ancora-frontend.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
